<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Dark skin gradient: deep blue-black to solid black -->
    <linearGradient id="orcaSkin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    
    <!-- White belly/patch gradient -->
    <linearGradient id="orcaWhite" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e2e8f0" />
    </linearGradient>

    <!-- Glow filter for tech/neon style -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Glowing accents -->
    <linearGradient id="accentGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.8" />
    </linearGradient>
  </defs>

  <!-- Ambient back glow for premium tech theme -->
  <path d="M 120,280 C 180,180 320,100 480,140 C 580,160 680,240 730,280 C 660,320 560,350 440,340 C 300,330 180,310 120,280 Z" fill="url(#accentGlow)" filter="url(#neonGlow)" opacity="0.25" />

  <!-- The Orca Group -->
  <g id="orca-whale-body">
    <!-- Main Black Body -->
    <path d="
      M 120,310
      C 180,290 280,210 370,190
      C 375,190 380,150 382,120
      C 383,100 395,95 400,100
      C 405,108 402,150 405,192
      C 480,195 580,205 660,230
      C 700,242 720,255 715,268
      C 710,280 680,285 650,285
      C 550,285 460,325 360,325
      C 280,325 200,320 120,310 Z" 
      fill="url(#orcaSkin)" 
      stroke="#1e293b" 
      stroke-width="2" 
    />

    <!-- Tail Flukes -->
    <path d="
      M 120,310
      C 110,312 90,335 70,345
      C 60,350 55,345 60,335
      C 70,320 90,312 105,310
      C 90,308 70,300 60,285
      C 55,275 60,270 70,275
      C 90,285 110,308 120,310 Z"
      fill="url(#orcaSkin)"
    />

    <!-- White Belly Patch -->
    <path d="
      M 670,270
      C 630,273 570,275 510,290
      C 440,310 380,318 350,318
      C 320,318 300,312 280,300
      C 290,295 305,290 320,292
      C 345,295 365,302 390,298
      C 420,292 450,275 480,265
      C 520,255 570,255 640,265
      Z" 
      fill="url(#orcaWhite)" 
    />

    <!-- Flank patch -->
    <path d="
      M 300,300
      C 270,302 240,290 220,270
      C 230,265 245,268 260,278
      C 280,290 290,295 300,300 Z"
      fill="url(#orcaWhite)"
    />

    <!-- Eye Patch -->
    <ellipse cx="610" cy="232" rx="25" ry="10" transform="rotate(-12, 610, 232)" fill="url(#orcaWhite)" />

    <!-- Saddle Patch -->
    <path d="
      M 412,193
      C 425,195 445,200 455,212
      C 440,218 425,210 415,198
      Z"
      fill="#64748b" 
      opacity="0.6"
    />

    <!-- Pectoral Fin (Flipper) -->
    <path d="
      M 500,280
      C 490,310 460,360 420,380
      C 405,388 395,380 405,365
      C 430,330 475,295 500,280 Z"
      fill="url(#orcaSkin)"
      stroke="#0f172a"
      stroke-width="1"
    />
  </g>
</svg>
